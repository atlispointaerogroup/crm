<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlisPoint Aero Group — Operations Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>(function(){try{var t=localStorage.getItem('ap-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ========== LOGIN SCREEN ========== -->
<div id="login-screen" class="login-screen">
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 4L6 14v20l18 10 18-10V14L24 4z" stroke="#60A5FA" stroke-width="2" fill="none"/>
                    <path d="M12 20l12-6 12 6-12 6-12-6z" fill="#60A5FA" opacity="0.3"/>
                    <path d="M24 8l-4 12h8L24 8z" fill="#60A5FA"/>
                    <path d="M16 24l8 4 8-4" stroke="#60A5FA" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
            <h1>AtlisPoint Aero Group</h1>
            <p class="login-subtitle">Operations Portal</p>
        </div>
        <form id="login-form" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <div id="login-error" class="login-error"></div>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        </form>
        <p class="login-footer">Authorized access only. All activity is logged.</p>
    </div>
</div>

<!-- ========== MAIN CRM APPLICATION ========== -->
<div id="app" class="app" style="display:none;">

    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/></svg>
            </button>
            <div class="topbar-brand">
                <span class="brand-logo" role="img" aria-label="AtlisPoint Aero Group"></span>
                <span class="brand-text">AtlisPoint Aero Group</span>
            </div>
        </div>
        <div class="topbar-right">
            <div class="topbar-search">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
                <input type="text" placeholder="Search clients, missions, crew..." id="global-search" oninput="handleGlobalSearch(this.value)">
            </div>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light and dark mode">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </button>
            <div class="topbar-user" onclick="toggleUserMenu()">
                <div class="user-avatar" id="user-avatar">MG</div>
                <div class="user-menu" id="user-menu">
                    <div class="user-menu-header" id="user-menu-header">Matt Gadalla</div>
                    <a onclick="showSettings()">Settings</a>
                    <a onclick="handleLogout()">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <ul class="nav-list">
            <li class="nav-item active" data-module="dashboard" onclick="navigateTo('dashboard')">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z"/></svg>
                <span>Dashboard</span>
            </li>
            <li class="nav-item" data-module="pipeline" onclick="navigateTo('pipeline')">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M2 4a2 2 0 012-2h12a2 2 0 012 2v2H2V4zm0 4h16v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8zm6 2a1 1 0 100 2h4a1 1 0 100-2H8z"/></svg>
                <span>Pipeline</span>
            </li>
            <li class="nav-item" data-module="clients" onclick="navigateTo('clients')">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                <span>Clients</span>
            </li>
            <li class="nav-item" data-module="missions" onclick="navigateTo('missions')">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
                <span>Missions</span>
            </li>
            <li class="nav-item" data-module="crew" onclick="navigateTo('crew')">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zm8 0a3 3 0 11-6 0 3 3 0 016 0zm-4.07 11c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
                <span>Crew</span>
            </li>
            <li class="nav-item" data-module="invoicing" onclick="navigateTo('invoicing')">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4zm14 5H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z"/></svg>
                <span>Invoicing</span>
            </li>
            <li class="nav-item" data-module="documents" onclick="navigateTo('documents')">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z"/></svg>
                <span>Documents</span>
            </li>
            <li class="nav-item" id="nav-admin" data-module="admin" onclick="navigateTo('admin')" style="display:none;">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 1l7 3v5c0 4.25-2.97 8.18-7 9-4.03-.82-7-4.75-7-9V4l7-3zm0 2.18L5 5.3V9c0 3.25 2.18 6.31 5 7.07 2.82-.76 5-3.82 5-7.07V5.3l-5-2.12zM9 12l-2.5-2.5 1.06-1.06L9 9.88l3.44-3.44L13.5 7.5 9 12z"/></svg>
                <span>Admin</span>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="sidebar-version">AtlisPoint CRM v1.0</div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content" id="main-content">
        <!-- Content injected by JS modules -->
    </main>

</div>

<!-- ========== MODAL OVERLAY ========== -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 id="modal-title">Modal Title</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<!-- Toast notifications -->
<div id="toast-container" class="toast-container"></div>

<script>
function toggleTheme(){
    var d = document.documentElement;
    var next = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    d.setAttribute('data-theme', next);
    try { localStorage.setItem('ap-theme', next); } catch(e) {}
}
</script>

<!-- Mapping libraries (for the dashboard world map) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/pipeline.js"></script>
<script src="js/modules/clients.js"></script>
<script src="js/modules/missions.js"></script>
<script src="js/modules/crew.js"></script>
<script src="js/modules/invoicing.js"></script>
<script src="js/modules/documents.js"></script>
<script src="js/modules/admin.js"></script>
<script src="js/modules/worldmap.js"></script>

</body>
</html>
